[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q --disable-warnings --maxfail=1 --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=70"
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["src"]
omit = [
  "src/__init__.py",
  "src/analysis/__init__.py",
  "src/data/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "config", "scripts", "dashboard", "tests"]

[tool.ruff.lint]
select = ["E", "F", "B", "UP"]
ignore = ["E501", "E722"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["^venv/"]