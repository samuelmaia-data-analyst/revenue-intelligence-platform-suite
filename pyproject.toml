[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
(
  /(
      \.venv
    | __pycache__
    | data
  )/
)
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "__pycache__", "data"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
