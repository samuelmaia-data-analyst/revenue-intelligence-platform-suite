name: dbt-docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "modules/revenue-intelligence/dbt/**"
      - ".github/workflows/dbt-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dbt-docs-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt deps
        run: |
          python -m pip install --upgrade pip
          pip install -r modules/revenue-intelligence/requirements-dbt.txt

      - name: Create dbt profile for CI (duckdb)
        run: |
          mkdir -p .github/dbt
          cat <<EOF > .github/dbt/profiles.yml
          revenue_intelligence:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: .github/dbt/revenue_intelligence.duckdb
                schema: analytics
                threads: 4
          EOF

      - name: Generate dbt docs
        env:
          DBT_PROFILES_DIR: .github/dbt
        run: |
          dbt deps --project-dir modules/revenue-intelligence/dbt
          dbt parse --project-dir modules/revenue-intelligence/dbt --target ci
          dbt docs generate --project-dir modules/revenue-intelligence/dbt --target ci --empty-catalog

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: modules/revenue-intelligence/dbt/target

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
